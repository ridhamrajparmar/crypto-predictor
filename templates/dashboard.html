<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Terminal | AI Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-bg: #0f172a; 
            --sidebar-bg: #1e293b;
            --accent: #8b5cf6; 
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --card-bg: #1e293b;
            --border: #334155;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--primary-bg); color: var(--text-main);
        }

        .main-container { display: flex; height: 100vh; }

        /* --- Sidebar (30%) --- */
        .sidebar {
            width: 30%; background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
        }

        .sidebar-header { 
            padding: 25px; border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center;
        }

        .live-status { display: flex; align-items: center; font-size: 0.8rem; font-weight: 700; color: var(--success); }
        .dot { height: 8px; width: 8px; background: var(--success); border-radius: 50%; margin-right: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(34, 197, 94, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0px rgba(34, 197, 94, 0); } }

        /* Modified Grid: Text Only Cards */
        .coin-grid { flex: 1; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: 1fr; gap: 8px; }

        .coin-card {
            background: #1e293b; border: 1px solid var(--border); border-radius: 12px; padding: 18px 25px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: all 0.2s ease;
        }
        .coin-card:hover { border-color: var(--accent); background: #334155; }
        .coin-card.active { background: var(--accent); border-color: var(--accent); color: white; }
        .coin-card.active strong { color: white; }
        .coin-card.active .arrow-icon { color: white; opacity: 1; }

        .arrow-icon { font-size: 1.1rem; color: var(--accent); opacity: 0.3; }

        /* --- Main Display Area (70%) --- */
        .display-area { width: 70%; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .data-card {
            background: var(--card-bg); width: 95%; max-width: 850px; border-radius: 32px; padding: 45px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); display: none;
            border: 1px solid var(--border);
        }

        .header-flex { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
        .price-val { font-size: 3rem; font-weight: 800; color: var(--text-main); margin: 5px 0 0 0; }
        
        .chart-box { width: 100%; height: 320px; margin: 25px 0; border-radius: 20px; background: #0f172a; padding: 15px; border: 1px solid var(--border); }

        .pred-container {
            padding: 25px; border-radius: 24px; background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.2);
            display: flex; justify-content: space-between; align-items: center;
        }
        .pred-price { color: var(--success); font-size: 2.4rem; font-weight: 800; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <h2 style="margin:0; font-size: 1.1rem; color: var(--text-dim);">ASSETS (30)</h2>
            <div class="live-status"><span class="dot"></span>LIVE</div>
        </div>
        <div class="coin-grid">
            {% for coin in coins %}
            <div class="coin-card" onclick="loadCoinData(this, '{{ coin }}')">
                <strong style="font-size: 1rem; text-transform: uppercase;">{{ coin }}</strong>
                <span class="arrow-icon">→</span>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="display-area">
        <div id="welcome-msg" style="text-align: center;">
            <h1 style="font-size: 2.5rem; color: var(--accent);">Crypto AI Terminal</h1>
            <p style="color: var(--text-dim);">Select an asset to generate AI predictions.</p>
        </div>
        
        <div class="data-card" id="data-card">
            <div class="header-flex">
                <h1 style="font-size: 2.8rem; margin:0;" id="title-name">-</h1>
                <div style="text-align: right;">
                    <small style="text-transform: uppercase; font-weight: bold; color: var(--text-dim);">Current Price (USD)</small>
                    <p class="price-val" id="title-price">$0.00</p>
                </div>
            </div>

            <div class="chart-box">
                <canvas id="mainChart"></canvas>
            </div>

            <div class="pred-container">
                <div>
                    <strong style="color: var(--success); font-size: 1.1rem;">AI Forecast (7-Day Target)</strong>
                    <p style="margin: 5px 0 0 0; font-size: 0.8rem; color: var(--text-dim);">Model: LSTM Neural Network</p>
                </div>
                <div class="pred-price" id="title-pred">$0.00</div>
            </div>
        </div>
    </div>
</div>

<script>
    let chartInstance = null;

    async function loadCoinData(element, coin) {
        document.getElementById('welcome-msg').style.display = 'none';
        document.getElementById('data-card').style.display = 'block';
        
        document.querySelectorAll('.coin-card').forEach(c => c.classList.remove('active'));
        element.classList.add('active');

        const res = await fetch('/predict', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({coin: coin})
        });
        const data = await res.json();

        document.getElementById('title-name').innerText = coin;
        document.getElementById('title-price').innerText = '$' + data.current_price.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('title-pred').innerText = '$' + data.predicted_price.toLocaleString(undefined, {minimumFractionDigits: 2});

        const ctx = document.getElementById('mainChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(data.chart_values.length).fill(''),
                datasets: [{
                    data: data.chart_values,
                    borderColor: '#8b5cf6',
                    borderWidth: 4,
                    pointRadius: 0,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: (context) => {
                        const bg = context.chart.ctx.createLinearGradient(0, 0, 0, 300);
                        bg.addColorStop(0, 'rgba(139, 92, 246, 0.3)');
                        bg.addColorStop(1, 'rgba(139, 92, 246, 0)');
                        return bg;
                    }
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    x: { display: false },
                    y: { 
                        grid: { color: '#334155', drawBorder: false }, 
                        ticks: { color: '#64748b' } 
                    }
                }
            }
        });
    }
</script>
</body>
</html>
