<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Crypto Predictor</title>
    <style>
        /* 1. Prevent Scrolling and Set Background */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Fixes the "no scroll" requirement */
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f3e8ff 0%, #e9d5ff 100%); /* Light Purple/Lavender */
        }

        /* 2. Centering the Content */
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            position: relative;
            text-align: center;
            z-index: 2;
        }

        .main-title {
            font-size: 3.5rem;
            font-weight: 800;
            color: #4a1d96; /* Deep Purple for contrast */
            margin: 0;
            letter-spacing: -1px;
        }

        .sub-title {
            font-size: 1.2rem;
            color: #6b21a8;
            margin-top: 10px;
            font-weight: 400;
        }

        .cta-button {
            margin-top: 30px;
            padding: 15px 40px;
            background-color: #7c3aed;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(124, 58, 237, 0.3);
        }

        .cta-button:hover {
            transform: scale(1.05);
            background-color: #6d28d9;
        }

        /* 3. The "Magazine" Background Text */
        .magazine-text {
            position: absolute;
            bottom: -8%; /* Pushes 25% of the text below the viewport */
            left: 50%;
            transform: translateX(-50%);
            font-size: 11vw; /* Massive size relative to screen width */
            font-weight: 900;
            color: white;
            opacity: 0.4; /* Blends it with the purple background */
            white-space: nowrap;
            user-select: none;
            z-index: 1; /* Sits behind the main titles */
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <h1 class="main-title">AI-Powered<br>Cryptocurrency Predictor</h1>
        <p class="sub-title">Advanced LSTM Neural Networks for Market Analysis</p>
        <button class="cta-button" onclick="location.href='/dashboard'">Launch Predictor</button>
    </div>

    <div class="magazine-text">Cryptocurrency</div>

</body>
</html>
